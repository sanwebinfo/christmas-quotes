description: Prepares the repo for a typical CI job

name: Prepare

runs:
  steps:
    - uses: pnpm/action-setup@v6.0.5
      with:
        version: 8.15.9
    - uses: actions/setup-node@v4
      with:
        node-version: '20.20.2'
        cache: pnpm
    - run: pnpm install
      shell: bash
  using: composite